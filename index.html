<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SYNAPSE'26 Certificate Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Tailwind CSS (IMPORTANT FIX) -->
<!-- <script src="https://cdn.tailwindcss.com"></script> -->
<link href="./src/output.css" rel="stylesheet">

<!-- ✅ jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="min-h-screen bg-slate-950 flex items-center justify-center">

<!-- ================= UI CARD ================= -->
<div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-xl shadow-2xl p-8 text-white">

  <h1 class="text-3xl font-bold text-center text-cyan-400">
    SYNAPSE’26
  </h1>

  <p class="text-center text-slate-400 mb-6">
    Certificate Generator Portal
  </p>

  <input
    id="nameInput"
    type="text"
    placeholder="Enter Registered Name"
    class="w-full p-3 rounded bg-slate-800 border border-slate-600
           focus:ring-2 focus:ring-cyan-500 outline-none mb-4">

  <button
    onclick="validateAndGenerate()"
    class="w-full bg-cyan-500 hover:bg-cyan-600 text-black
           font-semibold py-3 rounded transition">
    Generate Certificate (PDF)
  </button>

  <p id="errorMsg" class="hidden text-red-400 text-center mt-4">
    ❌ Certificate not available for this name
  </p>

</div>

<!-- Hidden Canvas -->
<canvas id="canvas" width="1200" height="850" class="hidden"></canvas>

<script>

/* ---------- ALLOWED PARTICIPANTS ---------- */
const allowedNames = ["Srabani Nahak"
                     "Srabani Nahak", "Santoshi Kumari Bisoyi", "Bipasa Behera", "Smita Pragnya Gouda", "Ch Sneha Patro", "Truptimayee Pradhan", "Sruti Padhy", "Shruti Sabat", "Sarte Sripriya", "Subhashree Behera", "K. Ankita Patra", "Arpita Padhy", "Salini Bisoyi", "Neha Singh", "A. Devi", "Snehaprabha Nayak", "Smruti Rani Nayak", "Ruchismita Badatya", "Payal Nayak", "Sreetisha Sahu", "Kalyani Behera", "Alisha Panda", "Pratibha Padhy", "Akankhya Pttanayak", "Sanchita Pradhan", "Priyadarshini Bebarta", "Gayatri Padhi", "Arpita Kumari Sahu", "Deepa Mohanty", "Asha Kunwar", "Ankita Kumari Nayak", "Subhasree Parida", "Trushali Sahu", "Priyanka Sabat", "Amrita Pattnayak", "P Jyoshna", "Salagram Padhi", "Rajalaxmi Sahu", "Manisha Sahu", "Sanaya Behera", "Priyanjali Rath", "Arpita Sabat", "A Sriya Patro", "Rajani Gamango", "Sudipta Priyadarshini Biswal", "Abhipsa P Sahu", "Vidita Sethi", "Jhansi Rani Sahu"
                     ]; // short for testing

function validateAndGenerate() {
  const name = document.getElementById("nameInput").value.trim();
  const error = document.getElementById("errorMsg");

  error.classList.add("hidden");

  const valid = allowedNames
    .map(n => n.toLowerCase())
    .includes(name.toLowerCase());

  if (!valid) {
    error.classList.remove("hidden");
    return;
  }

  generatePDF(name);
}

function generatePDF(name) {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#22d3ee";
  ctx.font = "bold 40px Arial";
  ctx.textAlign = "center";
  ctx.fillText("SYNAPSE’26", 600, 200);

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText(name, 600, 350);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("landscape", "px", [1200, 850]);

  pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, 1200, 850);
  pdf.save(`certificate_${name}.pdf`);
}

</script>

</body>
</html>
